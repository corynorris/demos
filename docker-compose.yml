# demos.corynorris.me — deployed by Dokploy (git push → redeploy).
#
# Dokploy provides Traefik ingress → routes demos.corynorris.me to the nginx
# router service. nginx strips app-specific URL prefixes and proxies internally.
#
# Network model (following the portfolio-2027 pattern):
#   - internal: all app services + nginx router (private, service-to-service)
#   - dokploy-network (external): nginx router only (so Dokploy's Traefik can reach it)

services:
  # ══════════════════════════════════════════════════════════
  # Path-based reverse proxy (joins both networks)
  # ══════════════════════════════════════════════════════════
  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.router
    restart: unless-stopped
    networks:
      - internal
      - dokploy-network

  # ══════════════════════════════════════════════════════════
  # Static SPAs (Vite → nginx)
  # ══════════════════════════════════════════════════════════
  roguelike:
    build:
      context: ./apps/roguelike
      dockerfile: ../../docker/Dockerfile.static
      args:
        VITE_BASE: /roguelike/
    restart: unless-stopped
    networks:
      - internal

  life:
    build:
      context: ./apps/life
      dockerfile: ../../docker/Dockerfile.static
      args:
        VITE_BASE: /life/
    restart: unless-stopped
    networks:
      - internal

  recipebox:
    build:
      context: ./apps/recipebox
      dockerfile: ../../docker/Dockerfile.static
      args:
        VITE_BASE: /recipebox/
    restart: unless-stopped
    networks:
      - internal

  tilemap:
    build:
      context: ./apps/tilemap
      dockerfile: ../../docker/Dockerfile.static
      args:
        VITE_BASE: /tilemap/
    restart: unless-stopped
    networks:
      - internal

  # ══════════════════════════════════════════════════════════
  # Node.js apps (Express + Socket.IO + React)
  # ══════════════════════════════════════════════════════════
  voting:
    build:
      context: ./apps/voting-app-react
      dockerfile: ../../docker/Dockerfile.voting
      args:
        VITE_BASE: /voting/
        SOCKETIO_PATH: /voting/socket.io
    restart: unless-stopped
    networks:
      - internal

  chat:
    build:
      context: ./apps/socket-io-chat-app
      dockerfile: ../../docker/Dockerfile.chat
      args:
        VITE_BASE: /chat/
        SOCKETIO_PATH: /chat/socket.io
    restart: unless-stopped
    networks:
      - internal

  comments:
    build:
      context: ./apps/react-comment-box
      dockerfile: ../../docker/Dockerfile.comments
      args:
        VITE_BASE: /comments/
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-demos}:${POSTGRES_PASSWORD}@db:5432/comments
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - internal

  shortener:
    build:
      context: ./apps/url-shortener
      dockerfile: ../../docker/Dockerfile.shortener
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-demos}:${POSTGRES_PASSWORD}@db:5432/url_shortener
      BASE_URL: ${BASE_URL:-https://demos.corynorris.me/s}
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - internal

  # ══════════════════════════════════════════════════════════
  # Elixir/Phoenix apps
  # ══════════════════════════════════════════════════════════
  trello:
    build:
      context: ./apps/trello
      dockerfile: ../../docker/Dockerfile.trello
    restart: unless-stopped
    environment:
      SECRET_KEY_BASE: ${TRELLO_SECRET_KEY_BASE}
      SECRET_KEY: ${TRELLO_SECRET_KEY}
      DATABASE_URL: ecto://${POSTGRES_USER:-demos}:${POSTGRES_PASSWORD}@db:5432/trello
      PORT: "4000"
      HOST: "0.0.0.0"
      BASE_PATH: "/trello"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - internal

  # ══════════════════════════════════════════════════════════
  # Spaced Repetition (SvelteKit)
  # ══════════════════════════════════════════════════════════
  srs:
    build:
      context: ./apps/spaced-repitition
      dockerfile: ../../docker/Dockerfile.srs
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-demos}:${POSTGRES_PASSWORD}@db:5432/spaced_repetition
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-auth-secret-change-me-minimum-32-chars}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-https://demos.corynorris.me/srs}
      BASE_PATH: /srs
      LLM_BASE_URL: ${LLM_BASE_URL:-http://10.88.111.16:8080}
      LLM_MODEL: ${LLM_MODEL:-qwen3.5-4b}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-60000}
      AI_RATE_LIMIT_PER_USER: ${AI_RATE_LIMIT_PER_USER:-5}
      AI_RATE_LIMIT_WINDOW_MS: ${AI_RATE_LIMIT_WINDOW_MS:-60000}
      HOST: "0.0.0.0"
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - internal

  # ══════════════════════════════════════════════════════════
  # Databases
  # ══════════════════════════════════════════════════════════
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-demos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demos}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # One-shot: idempotently ensures all shared databases exist on EVERY deploy.
  # The first-boot init hook only runs on an empty volume, so this is what
  # provisions databases added after the volume was first created.
  db-init:
    image: postgres:16-alpine
    restart: "no"
    environment:
      PGHOST: db
      PGUSER: ${POSTGRES_USER:-demos}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: postgres
    entrypoint: ["sh", "/init-multi-db.sh"]
    volumes:
      - ./scripts/init-multi-db.sh:/init-multi-db.sh:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:

networks:
  internal:
  dokploy-network:
    external: true
