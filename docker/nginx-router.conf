# nginx path-based router for demos.corynorris.me
# Strips app prefix, proxies to internal containers.
# WebSocket upgrades enabled for Socket.IO apps (voting, chat).

upstream voting_upstream { server voting:8090; }
upstream chat_upstream    { server chat:3000; }
upstream comments_upstream { server comments:3001; }
upstream shortener_upstream { server shortener:3002; }
upstream srs_upstream     { server srs-web:80; }
upstream video_upstream   { server video:4000; }

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    # ── Landing page ──────────────────────────────────
    location = / {
        return 200 "<!DOCTYPE html>
<html lang=\"en\">
<head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">
<title>Demos — corynorris.me</title>
<style>body{font-family:system-ui,sans-serif;max-width:640px;margin:2rem auto;padding:0 1rem;line-height:1.6;color:#333}h1{margin-bottom:.25rem}ul{padding-left:1.25rem}li{margin:.4rem 0}a{color:#0366d6;text-decoration:none}a:hover{text-decoration:underline}</style>
</head><body><h1>Demos</h1><p>Collection of demo apps:</p>
<ul>
<li><a href=\"/roguelike\">/roguelike</a> — Dungeon crawler</li>
<li><a href=\"/life\">/life</a> — Conway's Game of Life</li>
<li><a href=\"/recipebox\">/recipebox</a> — Recipe manager</li>
<li><a href=\"/voting\">/voting</a> — Tournament voting</li>
<li><a href=\"/chat\">/chat</a> — Real-time chat</li>
<li><a href=\"/comments\">/comments</a> — Comment box</li>
<li><a href=\"/s\">/s</a> — URL shortener</li>
<li><a href=\"/srs\">/srs</a> — Spaced repetition</li>
<li><a href=\"/video\">/video</a> — Video API</li>
</ul></body></html>";
        add_header Content-Type text/html;
    }

    # ── Static SPAs (nginx containers, SPA fallback) ───
    location /roguelike/ {
        rewrite ^/roguelike(/.*)$ $1 break;
        proxy_pass http://roguelike:80;
        proxy_set_header Host $host;
    }

    location /life/ {
        rewrite ^/life(/.*)$ $1 break;
        proxy_pass http://life:80;
        proxy_set_header Host $host;
    }

    location /recipebox/ {
        rewrite ^/recipebox(/.*)$ $1 break;
        proxy_pass http://recipebox:80;
        proxy_set_header Host $host;
    }

    # ── SRS frontend (nginx with /api/* internal proxy) ──
    location /srs/ {
        rewrite ^/srs(/.*)$ $1 break;
        proxy_pass http://srs_upstream;
        proxy_set_header Host $host;
    }

    # ── Node.js + Socket.IO apps (WebSocket upgrade) ───
    location /voting/ {
        rewrite ^/voting(/.*)$ $1 break;
        proxy_pass http://voting_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /chat/ {
        rewrite ^/chat(/.*)$ $1 break;
        proxy_pass http://chat_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Express apps (standard HTTP) ───────────────────
    location /comments/ {
        rewrite ^/comments(/.*)$ $1 break;
        proxy_pass http://comments_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # URL shortener — matches /s and /s/anything
    location /s {
        rewrite ^/s(/.*)$ $1 break;
        proxy_pass http://shortener_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Video API ──────────────────────────────────────
    location /video/ {
        rewrite ^/video(/.*)$ $1 break;
        proxy_pass http://video_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
