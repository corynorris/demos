# nginx path-based router for demos.corynorris.me
# Strips app prefix, proxies to internal containers.
# WebSocket upgrades enabled for Socket.IO apps (voting, chat).
#
# Uses variable-based proxy_pass + Docker's internal resolver so nginx starts
# even when backends are temporarily down (resolved at request time).

# Docker internal DNS
resolver 127.0.0.11 valid=30s ipv6=off;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    # ── Landing page ──────────────────────────────────
    location = / {
        return 200 "<!DOCTYPE html>
<html lang=\"en\">
<head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width,initial-scale=1\">
<title>Demos — corynorris.me</title>
<style>body{font-family:system-ui,sans-serif;max-width:640px;margin:2rem auto;padding:0 1rem;line-height:1.6;color:#333}h1{margin-bottom:.25rem}ul{padding-left:1.25rem}li{margin:.4rem 0}a{color:#0366d6;text-decoration:none}a:hover{text-decoration:underline}</style>
</head><body><h1>Demos</h1><p>Collection of demo apps:</p>
<ul>
<li><a href=\"/roguelike\">/roguelike</a> — Dungeon crawler</li>
<li><a href=\"/life\">/life</a> — Conway's Game of Life</li>
<li><a href=\"/recipebox\">/recipebox</a> — Recipe manager</li>
<li><a href=\"/tilemap\">/tilemap</a> — Tile-to-texture mapper</li>
<li><a href=\"/voting\">/voting</a> — Tournament voting</li>
<li><a href=\"/chat\">/chat</a> — Real-time chat</li>
<li><a href=\"/comments\">/comments</a> — Comment box</li>
<li><a href=\"/s\">/s</a> — URL shortener</li>
<li><a href=\"/srs\">/srs</a> — Spaced repetition</li>
<li><a href=\"/trello\">/trello</a> — Kanban board (Trello clone)</li>
</ul></body></html>";
        add_header Content-Type text/html;
    }

    # Canonicalize app roots so prefix-stripping locations handle them.
    location = /roguelike { return 301 /roguelike/; }
    location = /life { return 301 /life/; }
    location = /recipebox { return 301 /recipebox/; }
    location = /tilemap { return 301 /tilemap/; }
    location = /trello { return 301 /trello/; }
    location = /voting { return 301 /voting/; }
    location = /chat { return 301 /chat/; }
    location = /comments { return 301 /comments/; }
    location = /srs { return 301 /srs/; }

    # ── Static SPAs (nginx containers, SPA fallback) ───
    location /roguelike/ {
        set $roguelike_backend "roguelike:80";
        rewrite ^/roguelike(/.*)$ $1 break;
        proxy_pass http://$roguelike_backend;
        proxy_set_header Host $host;
    }

    location /life/ {
        set $life_backend "life:80";
        rewrite ^/life(/.*)$ $1 break;
        proxy_pass http://$life_backend;
        proxy_set_header Host $host;
    }

    location /recipebox/ {
        set $recipebox_backend "recipebox:80";
        rewrite ^/recipebox(/.*)$ $1 break;
        proxy_pass http://$recipebox_backend;
        proxy_set_header Host $host;
    }

    location /tilemap/ {
        set $tilemap_backend "tilemap:80";
        rewrite ^/tilemap(/.*)$ $1 break;
        proxy_pass http://$tilemap_backend;
        proxy_set_header Host $host;
    }

    # ── Elixir/Phoenix apps ────────────────────────────
    location /trello/ {
        set $trello_backend "trello:4000";
        rewrite ^/trello(/.*)$ $1 break;
        proxy_pass http://$trello_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade for Trello Phoenix channels
    location ^~ /trello/socket {
        set $trello_backend "trello:4000";
        proxy_pass http://$trello_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── SRS SvelteKit app ───────────────────────────────
    location /srs/ {
        set $srs_backend "srs:3000";
        proxy_pass http://$srs_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Node.js + Socket.IO apps (WebSocket upgrade) ───
    location ^~ /voting/socket.io {
        set $voting_backend "voting:8090";
        proxy_pass http://$voting_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /voting/ {
        set $voting_backend "voting:8090";
        rewrite ^/voting(/.*)$ $1 break;
        proxy_pass http://$voting_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location ^~ /chat/socket.io {
        set $chat_backend "chat:3000";
        proxy_pass http://$chat_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    location /chat/ {
        set $chat_backend "chat:3000";
        rewrite ^/chat(/.*)$ $1 break;
        proxy_pass http://$chat_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Express apps (standard HTTP) ───────────────────
    location /comments/ {
        set $comments_backend "comments:3001";
        rewrite ^/comments(/.*)$ $1 break;
        proxy_pass http://$comments_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # URL shortener — matches /s and /s/anything
    location /s {
        set $shortener_backend "shortener:3002";
        rewrite ^/s/?(.*)$ /$1 break;
        proxy_pass http://$shortener_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
