# demos.corynorris.me — deployed by Dokploy (git push → redeploy).
#
# Cloudflare Tunnel handles TLS termination → Caddy is HTTP-only on :80.
# All service-to-service traffic runs on the private `internal` network.
# Caddy joins the shared `dokploy-network` so Traefik/Cloudflare can reach it.
#
# Naming rule: services unique on dokploy-network are safe. Internal-only
# services use generic names (db, mongo) inside the private network.

services:
  # ══════════════════════════════════════════════════════════
  # Static SPAs (Vite → nginx)
  # ══════════════════════════════════════════════════════════
  roguelike:
    build:
      context: ./apps/roguelike
      dockerfile: ../../docker/Dockerfile.static
    restart: unless-stopped
    networks:
      - internal

  life:
    build:
      context: ./apps/life
      dockerfile: ../../docker/Dockerfile.static
    restart: unless-stopped
    networks:
      - internal

  recipebox:
    build:
      context: ./apps/recipebox
      dockerfile: ../../docker/Dockerfile.static
    restart: unless-stopped
    networks:
      - internal

  # ══════════════════════════════════════════════════════════
  # Node.js apps (Express + Socket.IO + React)
  # ══════════════════════════════════════════════════════════
  voting:
    build:
      context: ./apps/voting-app-react
      dockerfile: ../../docker/Dockerfile.voting
    restart: unless-stopped
    networks:
      - internal

  chat:
    build:
      context: ./apps/socket-io-chat-app
      dockerfile: ../../docker/Dockerfile.chat
    restart: unless-stopped
    networks:
      - internal

  comments:
    build:
      context: ./apps/react-comment-box
      dockerfile: ../../docker/Dockerfile.comments
    restart: unless-stopped
    volumes:
      - comment_data:/app/data
    networks:
      - internal

  shortener:
    build:
      context: ./apps/url-shortener
      dockerfile: ../../docker/Dockerfile.shortener
    restart: unless-stopped
    environment:
      - MONGODB_URI=mongodb://mongo:27017/url-shortener
      - BASE_URL=${BASE_URL:-https://demos.corynorris.me/s}
    networks:
      - internal

  # ══════════════════════════════════════════════════════════
  # Spaced Repetition (Rust API + React frontend)
  # ══════════════════════════════════════════════════════════
  srs-api:
    build:
      context: ./apps/spaced-repitition
      dockerfile: ../../docker/Dockerfile.srs
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://demos:demos@db:5432/spaced_repetition}
      ADDRESS: "0.0.0.0"
      PORT: "5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  srs-web:
    build:
      context: ./apps/spaced-repitition
      dockerfile: ../../docker/Dockerfile.srs-web
    restart: unless-stopped
    networks:
      - internal

  # ══════════════════════════════════════════════════════════
  # Video API (Elixir/Phoenix)
  # ══════════════════════════════════════════════════════════
  video:
    build:
      context: ./apps/video-api
      dockerfile: ../../docker/Dockerfile.video
    restart: unless-stopped
    environment:
      - DATABASE_URL=ecto://demos:${POSTGRES_PASSWORD:-demos}@db:5432/video_api
      - SECRET_KEY_BASE=${VIDEO_SECRET_KEY_BASE:-CHANGE_ME_64_bytes_minimum}
      - SECRET_KEY=${VIDEO_SECRET_KEY:-CHANGE_ME}
      - UPLOADS_DIR=/app/uploads
      - TRANSCODES_DIR=/app/transcodes
      - MIX_ENV=prod
      - PORT=4000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - video_uploads:/app/uploads
      - video_transcodes:/app/transcodes
    networks:
      - internal

  # ══════════════════════════════════════════════════════════
  # Databases
  # ══════════════════════════════════════════════════════════
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-demos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multi-db.sh:/docker-entrypoint-initdb.d/init-multi-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-demos}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

  # ══════════════════════════════════════════════════════════
  # Reverse proxy (HTTP only — Cloudflare Tunnel handles TLS)
  # ══════════════════════════════════════════════════════════
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      - internal
      - dokploy-network

volumes:
  postgres_data:
  mongo_data:
  caddy_data:
  comment_data:
  video_uploads:
  video_transcodes:

networks:
  internal:
  dokploy-network:
    external: true
